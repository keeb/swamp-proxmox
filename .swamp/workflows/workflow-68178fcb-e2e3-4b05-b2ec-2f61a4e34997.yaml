id: 68178fcb-e2e3-4b05-b2ec-2f61a4e34997
name: delete-vm
description: 'Delete a VM by name (stops if running, then deletes)'
inputs:
  vmName:
    type: string
    required: true
    description: Name of the VM to delete
jobs:
  - name: delete
    steps:
      - name: auth
        task:
          type: model_method
          modelIdOrName: keebDev02
          methodName: auth
        dependsOn: []
        weight: 0
      - name: delete-vm
        task:
          type: model_method
          modelIdOrName: fleet
          methodName: delete
          inputs:
            vmName: '${{ inputs.vmName }}'
        dependsOn:
          - step: auth
            condition:
              type: succeeded
        weight: 0
    dependsOn: []
    weight: 0
version: 1
